services:

  proxy:
    build: .
    env_file: .env
    restart: unless-stopped
    networks:
      - trottinette_net
    volumes:
      - pio-cache:/root/.platformio
      - ./firmware/include/config.h:/app/firmware/include/config.h:ro
      - builds:/app/builds
    # Port exposé uniquement pour debug local — commenter en production
    # ports:
    #   - "3000:3000"

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - proxy
    networks:
      - trottinette_net

networks:
  trottinette_net:
    driver: bridge

volumes:
  pio-cache:
  builds:

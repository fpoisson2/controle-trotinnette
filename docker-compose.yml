services:

  proxy:
    build: .
    env_file: .env
    restart: unless-stopped
    networks:
      - trottinette_net
    volumes:
      - pio-cache:/root/.platformio
      - builds:/app/builds
      - data:/app/data
      # Monter config.h (nécessaire pour la compilation OTA)
      - ./firmware/include/config.h:/app/firmware/include/config.h:ro
    ports:
      - "${PROXY_PORT:-3000}:3000"

  # Cloudflared est optionnel — démarrer avec : docker compose --profile tunnel up -d
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - proxy
    networks:
      - trottinette_net
    profiles:
      - tunnel

networks:
  trottinette_net:
    driver: bridge

volumes:
  pio-cache:
  builds:
  data:

[env:esp32dev]
platform        = espressif32
board           = esp32dev
framework       = arduino
monitor_speed   = 115200
upload_speed    = 921600
monitor_filters = esp32_exception_decoder
board_build.partitions = min_spiffs.csv

lib_deps =
    links2004/WebSockets @ ^2.4.0
    bblanchon/ArduinoJson @ ^7.0.0
    olikraus/U8g2 @ ^2.35.0
    ; TinyGSM fork LilyGO dans lib/TinyGSM (local)
    plerup/EspSoftwareSerial @ ^8.2.0

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DTINY_GSM_MODEM_A7670

; ── Mise à jour sans-fil (OTA) ────────────────────────────────────────────────
; Utiliser quand l'ESP32 est déjà sur le réseau WiFi :
;   pio run -e esp32dev-ota --target upload
[env:esp32dev-ota]
platform        = espressif32
board           = esp32dev
framework       = arduino
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder
board_build.partitions = min_spiffs.csv

lib_deps =
    links2004/WebSockets @ ^2.4.0
    bblanchon/ArduinoJson @ ^7.0.0
    olikraus/U8g2 @ ^2.35.0
    ; TinyGSM fork LilyGO dans lib/TinyGSM (local)
    plerup/EspSoftwareSerial @ ^8.2.0

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DTINY_GSM_MODEM_A7670

upload_protocol = espota
upload_port     = trotilou.local   ; ou l'IP de l'ESP32
upload_flags    = --auth=ota1234

; ── OTA via proxy (à distance, tunnel Cloudflare) ────────────────────────────
; Utiliser quand l'ESP32 est accessible uniquement via le proxy :
;   AUTH_PASSWORD=monmotdepasse pio run -e esp32dev-proxy-ota --target upload
[env:esp32dev-proxy-ota]
platform        = espressif32
board           = esp32dev
framework       = arduino
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder
board_build.partitions = min_spiffs.csv

lib_deps =
    links2004/WebSockets @ ^2.4.0
    bblanchon/ArduinoJson @ ^7.0.0
    olikraus/U8g2 @ ^2.35.0
    ; TinyGSM fork LilyGO dans lib/TinyGSM (local)
    plerup/EspSoftwareSerial @ ^8.2.0

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DTINY_GSM_MODEM_A7670

upload_protocol = custom
upload_command  = python3 $PROJECT_DIR/ota_upload.py $SOURCE

[env:esp32dev]
platform        = espressif32
board           = esp32dev
framework       = arduino
monitor_speed   = 115200
upload_speed    = 921600
monitor_filters = esp32_exception_decoder

lib_deps =
    links2004/WebSockets @ ^2.4.0
    bblanchon/ArduinoJson @ ^7.0.0

build_flags =
    -DCORE_DEBUG_LEVEL=3

; ── Mise à jour sans-fil (OTA) ────────────────────────────────────────────────
; Utiliser quand l'ESP32 est déjà sur le réseau WiFi :
;   pio run -e esp32dev-ota --target upload
[env:esp32dev-ota]
platform        = espressif32
board           = esp32dev
framework       = arduino
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder

lib_deps =
    links2004/WebSockets @ ^2.4.0
    bblanchon/ArduinoJson @ ^7.0.0

build_flags =
    -DCORE_DEBUG_LEVEL=3

upload_protocol = espota
upload_port     = trottinette.local   ; ou l'IP de l'ESP32
upload_flags    = --auth=ota1234
